name: Release

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  package-vsix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run -ws --if-present test

      - name: Build
        run: npm run -ws --if-present build

      - name: Package VSIX
        run: npm run extension:package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: oj-vscode-vsix
          path: dist/placeholder-extension.vsix
          if-no-files-found: error
