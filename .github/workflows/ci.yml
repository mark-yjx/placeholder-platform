name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run -ws --if-present build

      - name: Test
        run: npm run -ws --if-present test

      - name: Smoke (optional)
        if: ${{ vars.ENABLE_SMOKE == 'true' }}
        run: npm run smoke:local
