name: placeholder-local

services:
  postgres:
    image: postgres:16-alpine
    container_name: placeholder-local-postgres
    environment:
      POSTGRES_USER: oj
      POSTGRES_PASSWORD: oj
      POSTGRES_DB: oj
    ports:
      - "5432:5432"
    volumes:
      - placeholder_local_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oj -d oj"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: node:22-alpine
    container_name: placeholder-local-api
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /workspace
    environment:
      PORT: "3100"
      DATABASE_URL: "postgresql://oj:oj@postgres:5432/oj"
      JWT_SECRET: "local-dev-secret"
      JWT_EXPIRES_IN: "1h"
      DOCKER_HOST: "unix:///var/run/docker.sock"
    volumes:
      - ../..:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - sh
      - -lc
      - |
        apk add --no-cache docker-cli docker-cli-compose >/dev/null
        exec npm run api:start
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3100/healthz >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 20

  worker:
    image: node:22-alpine
    container_name: placeholder-local-worker
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /workspace
    environment:
      DATABASE_URL: "postgresql://oj:oj@postgres:5432/oj"
      DOCKER_HOST: "unix:///var/run/docker.sock"
      DOCKER_IMAGE_PYTHON: "python:3.12-alpine"
    volumes:
      - ../..:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - sh
      - -lc
      - |
        apk add --no-cache docker-cli docker-cli-compose python3 >/dev/null
        touch /tmp/healthy
        exec npm run worker:start
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/healthy"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  placeholder_local_postgres_data:
